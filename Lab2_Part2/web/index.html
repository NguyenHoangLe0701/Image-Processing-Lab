<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Canny Edge Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <!-- Loading Screen -->
    <div id="loadingOverlay" class="overlay">
      <div class="spinner"></div>
      <p id="loadingText">Đang tải thư viện xử lý ảnh...</p>
    </div>

    <!-- Upload Section (Màn hình đầu tiên khi chưa có ảnh) -->
    <section id="uploadSection" class="upload-screen">
      <div class="upload-box">
        <h1>Canny Edge Detector</h1>
        <p>Phần mềm Demo thuật toán nhận diện biên cạnh</p>
        <div class="upload-actions-big">
          <label for="fileInput" class="btn-mega" id="uploadBtn">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
            Chọn ảnh để bắt đầu Demo
          </label>
        </div>
        <input type="file" id="fileInput" accept="image/*" hidden />
        <input type="file" id="cameraInput" accept="image/*" capture="environment" hidden />
      </div>
    </section>

    <!-- Result Section (Màn hình làm việc chính) -->
    <section id="resultSection" class="demo-layout hidden">
      <!-- Bảng điều khiển ngang (Phía trên) -->
      <header class="top-dashboard">
        <div class="dashboard-top-row">
          <h2>Canny Edge Demo</h2>
          <div class="top-actions">
            <div class="segment-control" id="modeToggle">
              <button class="segment-btn" id="modeOriginal">Ảnh Gốc</button>
              <button class="segment-btn active" id="modeCanny">Kết Quả Canny</button>
            </div>
            <button class="btn btn-outline" id="changeImageBtn">Đổi ảnh</button>
            <button class="btn btn-primary" id="downloadBtn">Lưu ảnh</button>
            <!-- Ẩn nút chụp ảnh đi ở chế độ demo máy tính, có thể hiện lại nếu cần -->
            <button class="hidden" id="captureBtn"></button>
            <button class="hidden" id="resetBtn"></button>
          </div>
        </div>

        <div class="dashboard-bottom-row controls-row">
          <div class="slider-box">
            <label>Làm mờ Blur (σ): <span id="blurVal" class="val-badge">5</span></label>
            <input type="range" id="blurSlider" min="1" max="21" step="2" value="5" class="slider-demo">
          </div>
          <div class="slider-box">
            <label>Ngưỡng thấp (Low): <span id="lowThreshVal" class="val-badge">50</span></label>
            <input type="range" id="lowThreshSlider" min="0" max="255" step="1" value="50" class="slider-demo">
          </div>
          <div class="slider-box">
            <label>Ngưỡng cao (High): <span id="highThreshVal" class="val-badge">150</span></label>
            <input type="range" id="highThreshSlider" min="0" max="255" step="1" value="150" class="slider-demo">
          </div>
        </div>
      </header>

      <!-- Vùng hiển thị ảnh siêu to khổng lồ -->
      <main class="huge-viewport">
        <div class="canvas-wrapper">
          <canvas id="canvasDisplay"></canvas>
        </div>
      </main>
    </section>

    <script async src="https://docs.opencv.org/4.8.0/opencv.js" type="text/javascript"></script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
