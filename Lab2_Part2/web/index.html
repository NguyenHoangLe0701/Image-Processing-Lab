<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Canny Edge Detector</title>
    <meta name="description" content="Bài thực hành thuật toán Canny" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <!-- Loading Screen -->
    <div id="loadingOverlay" class="overlay">
      <div class="spinner"></div>
      <p id="loadingText">Đang tải thư viện xử lý ảnh...</p>
    </div>

    <div id="app">
      <!-- Header -->
      <header id="header">
        <div class="logo">
          <h1>Canny Edge Detector</h1>
          <p class="tagline">Bài thực hành Chương 2 – Xử Lý Ảnh</p>
        </div>
      </header>

      <!-- Upload Section -->
      <section id="uploadSection">
        <div id="dropZone">
          <div class="drop-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
          </div>
          <h2>Tải ảnh lên</h2>
          <p>Kéo thả hoặc chọn ảnh từ thiết bị của bạn</p>
          <div class="upload-actions">
            <label for="fileInput" class="btn btn-primary" id="uploadBtn">
              Chọn ảnh
            </label>
            <button class="btn btn-outline" id="captureBtn">
              Chụp ảnh
            </button>
          </div>
          <input type="file" id="fileInput" accept="image/*" hidden />
          <input type="file" id="cameraInput" accept="image/*" capture="environment" hidden />
        </div>
      </section>

      <!-- Result Section -->
      <section id="resultSection" class="hidden">
        
        <!-- Controls -->
        <div id="controls">
          <div class="controls-header">
            <h2>Điều chỉnh thông số</h2>
            <button class="btn btn-sm btn-outline" id="resetBtn">Đặt lại</button>
          </div>
          <div class="sliders">
            <div class="slider-group">
              <div class="slider-label">
                <span>Làm mờ (Gaussian Blur)</span>
                <span class="slider-val" id="blurVal">5</span>
              </div>
              <input type="range" id="blurSlider" min="1" max="21" step="2" value="5">
            </div>
            <div class="slider-group">
              <div class="slider-label">
                <span>Ngưỡng thấp (T_low)</span>
                <span class="slider-val" id="lowThreshVal">50</span>
              </div>
              <input type="range" id="lowThreshSlider" min="0" max="255" step="1" value="50">
            </div>
            <div class="slider-group">
              <div class="slider-label">
                <span>Ngưỡng cao (T_high)</span>
                <span class="slider-val" id="highThreshVal">150</span>
              </div>
              <input type="range" id="highThreshSlider" min="0" max="255" step="1" value="150">
            </div>
          </div>
        </div>

        <!-- Mode Toggle -->
        <div id="modeToggle">
          <button class="mode-btn" id="modeOriginal">Ảnh gốc</button>
          <button class="mode-btn active" id="modeCanny">Bắt cạnh (Canny)</button>
        </div>

        <!-- Canvas Display -->
        <div id="imageDisplay">
          <div class="card-body">
            <canvas id="canvasDisplay"></canvas>
          </div>
        </div>

        <!-- Actions -->
        <div class="result-actions">
          <button class="btn btn-outline" id="changeImageBtn">
            Chọn ảnh khác
          </button>
          <button class="btn btn-primary" id="downloadBtn">
            Tải kết quả
          </button>
        </div>

      </section>
    </div>

    <script async src="https://docs.opencv.org/4.8.0/opencv.js" type="text/javascript"></script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
