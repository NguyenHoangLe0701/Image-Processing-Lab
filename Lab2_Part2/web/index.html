<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Canny Edge Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="overlay">
      <div class="spinner"></div>
      <p id="loadingText">Đang tải engine xử lý...</p>
    </div>

    <!-- Màn hình Upload -->
    <section id="uploadSection" class="screen flex-center">
      <div id="dropZone" class="upload-panel">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="icon mb-3"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
        <h2>Canny Edge Studio</h2>
        <p class="subtitle">Kéo thả ảnh vào đây để phân tích</p>
        <div class="actions">
          <label for="fileInput" class="btn btn-primary" id="uploadBtn">Mở ảnh từ thiết bị</label>
          <button class="btn btn-secondary" id="captureBtn">Chụp ảnh</button>
        </div>
        <input type="file" id="fileInput" accept="image/*" hidden />
        <input type="file" id="cameraInput" accept="image/*" capture="environment" hidden />
      </div>
    </section>

    <!-- Màn hình Studio -->
    <section id="resultSection" class="screen hidden">
      <!-- Top Toolbar -->
      <header class="toolbar top-bar">
        <div class="left-tools">
          <button class="btn btn-secondary" id="changeImageBtn" title="Quay lại chọn ảnh">
             <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
             Đổi ảnh
          </button>
        </div>
        
        <div class="center-tools">
          <div class="segment-control" id="modeToggle">
            <button class="segment-btn" id="modeOriginal">Ảnh Gốc</button>
            <button class="segment-btn active" id="modeCanny">Kết Quả Canny</button>
          </div>
        </div>

        <div class="right-tools">
          <button class="btn btn-icon" id="resetBtn" title="Đặt lại thông số mặc định">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><polyline points="3 3 3 8 8 8"></polyline></svg>
          </button>
          <button class="btn btn-primary" id="downloadBtn">Tải kết quả</button>
        </div>
      </header>

      <!-- Viewport -->
      <main class="viewport">
        <canvas id="canvasDisplay"></canvas>
      </main>

      <!-- Bottom Toolbar (Sliders) -->
      <footer class="toolbar bottom-bar">
        <div class="slider-group">
          <div class="slider-info">
            <label>Độ mờ (Blur)</label>
            <span id="blurVal" class="val">5</span>
          </div>
          <input type="range" id="blurSlider" min="1" max="21" step="2" value="5" class="slider" />
        </div>

        <div class="slider-group">
          <div class="slider-info">
            <label>Ngưỡng Thấp (Low)</label>
            <span id="lowThreshVal" class="val">50</span>
          </div>
          <input type="range" id="lowThreshSlider" min="0" max="255" step="1" value="50" class="slider" />
        </div>

        <div class="slider-group">
          <div class="slider-info">
            <label>Ngưỡng Cao (High)</label>
            <span id="highThreshVal" class="val">150</span>
          </div>
          <input type="range" id="highThreshSlider" min="0" max="255" step="1" value="150" class="slider" />
        </div>
      </footer>
    </section>

    <script async src="https://docs.opencv.org/4.8.0/opencv.js" type="text/javascript"></script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
