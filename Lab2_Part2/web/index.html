<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Canny Edge Detector</title>
    <meta name="description" content="Bài thực hành thuật toán Canny" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <!-- Loading Screen -->
    <div id="loadingOverlay" class="overlay">
      <div class="spinner"></div>
      <p id="loadingText">Đang tải thư viện xử lý ảnh...</p>
    </div>

    <div id="app">
      <!-- Header -->
      <header id="header">
        <div class="logo">
          <h1>Canny Edge Detector</h1>
        </div>
        <p class="tagline">Phát hiện biên cạnh sử dụng OpenCV.js</p>
      </header>

      <!-- Upload Section -->
      <section id="uploadSection">
        <div id="dropZone">
          <div class="drop-icon">
             <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
          </div>
          <h2>Tải ảnh lên để bắt đầu</h2>
          <p>Kéo thả ảnh hoặc chọn từ thiết bị của bạn</p>
          <div class="upload-actions">
            <label for="fileInput" class="btn btn-primary" id="uploadBtn">
              Chọn ảnh
            </label>
            <button class="btn btn-outline" id="captureBtn">
              Chụp ảnh
            </button>
          </div>
          <input type="file" id="fileInput" accept="image/*" hidden />
          <input type="file" id="cameraInput" accept="image/*" capture="environment" hidden />
        </div>
      </section>

      <!-- Result Section -->
      <section id="resultSection" class="hidden">
        
        <!-- Controls Panel -->
        <div id="controls" class="glass-panel">
          <div class="controls-header">
            <h2>Điều chỉnh thông số</h2>
            <button class="btn btn-sm btn-outline" id="resetBtn">Đặt lại</button>
          </div>
          <div class="sliders">
            <div class="slider-group">
              <div class="slider-label">
                <label for="blurSlider">Làm mờ (Gaussian Blur)</label>
                <span class="slider-val" id="blurVal">5</span>
              </div>
              <input type="range" id="blurSlider" min="1" max="21" step="2" value="5">
            </div>
            <div class="slider-group">
              <div class="slider-label">
                <label for="lowThreshSlider">Ngưỡng thấp (T_low)</label>
                <span class="slider-val" id="lowThreshVal">50</span>
              </div>
              <input type="range" id="lowThreshSlider" min="0" max="255" step="1" value="50">
            </div>
            <div class="slider-group">
              <div class="slider-label">
                <label for="highThreshSlider">Ngưỡng cao (T_high)</label>
                <span class="slider-val" id="highThreshVal">150</span>
              </div>
              <input type="range" id="highThreshSlider" min="0" max="255" step="1" value="150">
            </div>
          </div>
        </div>

        <!-- Mode Toggle -->
        <div id="modeToggle">
          <button class="mode-btn" id="modeOriginal">Ảnh gốc</button>
          <button class="mode-btn active" id="modeCanny">Bắt cạnh (Canny)</button>
        </div>

        <!-- Image Display -->
        <div id="imageDisplay">
          <div class="image-card">
            <div class="card-body">
              <canvas id="canvasDisplay"></canvas>
            </div>
          </div>
        </div>

        <!-- Actions -->
        <div class="result-actions">
          <button class="btn btn-outline" id="changeImageBtn">
            Chọn ảnh khác
          </button>
          <button class="btn btn-primary" id="downloadBtn">
            Tải kết quả
          </button>
        </div>
      </section>
    </div>

    <script async src="https://docs.opencv.org/4.8.0/opencv.js" type="text/javascript"></script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
