<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Canny Edge Detector Pro</title>
    <meta name="description" content="Trình bắt cạnh Canny chuyên nghiệp" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <!-- Loading Screen -->
    <div id="loadingOverlay" class="overlay">
      <div class="spinner"></div>
      <p id="loadingText">Đang khởi tạo lõi thuật toán...</p>
    </div>

    <!-- Top Navbar -->
    <nav class="navbar">
      <div class="nav-content">
        <div class="nav-brand">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="brand-icon">
            <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
            <polyline points="2 17 12 22 22 17"></polyline>
            <polyline points="2 12 12 17 22 12"></polyline>
          </svg>
          <h1>Canny Edge Pro</h1>
        </div>
        <div class="nav-links">
          <span class="badge">Lab 2 - Image Processing</span>
        </div>
      </div>
    </nav>

    <main id="app-main">
      <!-- Upload Section -->
      <section id="uploadSection" class="section-container">
        <div class="upload-card">
          <div id="dropZone" class="drop-zone">
            <div class="drop-icon">
              <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                <polyline points="21 15 16 10 5 21"></polyline>
              </svg>
            </div>
            <h2>Tải ảnh lên để bắt đầu</h2>
            <p>Kéo thả ảnh vào đây hoặc duyệt từ thiết bị của bạn.</p>
            <div class="upload-actions">
              <label for="fileInput" class="btn btn-primary" id="uploadBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                Chọn ảnh từ máy
              </label>
              <button class="btn btn-secondary" id="captureBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
                Chụp ảnh
              </button>
            </div>
            <input type="file" id="fileInput" accept="image/*" hidden />
            <input type="file" id="cameraInput" accept="image/*" capture="environment" hidden />
          </div>
        </div>
      </section>

      <!-- Result Section (2 Columns) -->
      <section id="resultSection" class="section-container hidden">
        <div class="workspace-grid">
          
          <!-- Sidebar (Controls) -->
          <aside class="sidebar">
            <div class="panel">
              <div class="panel-header">
                <h3>Tham số Canny</h3>
                <button class="btn-icon" id="resetBtn" title="Đặt lại mặc định">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><polyline points="3 3 3 8 8 8"></polyline></svg>
                </button>
              </div>
              <div class="panel-body">
                <div class="slider-group">
                  <div class="slider-header">
                    <label>Gaussian Blur (σ)</label>
                    <span class="value-badge" id="blurVal">5</span>
                  </div>
                  <input type="range" id="blurSlider" min="1" max="21" step="2" value="5" class="custom-slider">
                </div>
                
                <div class="slider-group">
                  <div class="slider-header">
                    <label>Ngưỡng thấp (T_low)</label>
                    <span class="value-badge" id="lowThreshVal">50</span>
                  </div>
                  <input type="range" id="lowThreshSlider" min="0" max="255" step="1" value="50" class="custom-slider">
                </div>
                
                <div class="slider-group">
                  <div class="slider-header">
                    <label>Ngưỡng cao (T_high)</label>
                    <span class="value-badge" id="highThreshVal">150</span>
                  </div>
                  <input type="range" id="highThreshSlider" min="0" max="255" step="1" value="150" class="custom-slider">
                </div>
              </div>
            </div>

            <div class="panel actions-panel">
              <button class="btn btn-secondary w-full" id="changeImageBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"></path><path d="M12 12v9"></path><path d="M8 17l4-4 4 4"></path></svg>
                Tải ảnh khác
              </button>
            </div>
          </aside>

          <!-- Main Viewport -->
          <div class="viewport">
            <div class="viewport-toolbar">
              <div class="segment-control" id="modeToggle">
                <button class="segment-btn" id="modeOriginal">Ảnh gốc</button>
                <button class="segment-btn active" id="modeCanny">Bắt cạnh (Canny)</button>
              </div>
              <button class="btn btn-primary" id="downloadBtn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                Tải về
              </button>
            </div>
            
            <div class="canvas-container">
              <canvas id="canvasDisplay"></canvas>
            </div>
          </div>

        </div>
      </section>
    </main>

    <script async src="https://docs.opencv.org/4.8.0/opencv.js" type="text/javascript"></script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
