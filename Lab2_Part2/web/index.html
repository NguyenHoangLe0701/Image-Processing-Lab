<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Canny Edge Detector</title>
    <meta name="description" content="Demo thuật toán phát hiện biên Canny - Xử Lý Ảnh" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="overlay">
      <div class="spinner"></div>
      <p id="loadingText">Đang tải OpenCV.js...</p>
    </div>

    <main id="app">

      <!-- Header -->
      <header id="header">
        <h1><i class="fa-solid fa-eye"></i> Canny Edge Detector</h1>
        <p class="subtitle">Bài thực hành Chương 2 – Xử Lý Ảnh</p>
      </header>

      <!-- Upload Area -->
      <section id="uploadSection">
        <div id="dropZone">
          <i class="fa-solid fa-cloud-arrow-up drop-icon"></i>
          <p>Kéo thả ảnh vào đây hoặc</p>
          <div class="upload-buttons">
            <label for="fileInput" class="btn btn-primary" id="uploadBtn">
              <i class="fa-solid fa-image"></i> Chọn ảnh
            </label>
            <button class="btn btn-secondary" id="captureBtn">
              <i class="fa-solid fa-camera"></i> Chụp ảnh
            </button>
          </div>
          <input type="file" id="fileInput" accept="image/*" hidden />
          <input type="file" id="cameraInput" accept="image/*" capture="environment" hidden />
        </div>
      </section>

      <!-- Result Area (ẩn cho đến khi có ảnh) -->
      <section id="resultSection" class="hidden">

        <!-- Controls -->
        <div id="controls">
          <div class="slider-group">
            <label>Làm mờ (Blur / Sigma): <span id="blurVal" class="val">5</span></label>
            <input type="range" id="blurSlider" min="1" max="21" step="2" value="5">
          </div>
          <div class="slider-group">
            <label>Ngưỡng thấp (T_low): <span id="lowThreshVal" class="val">50</span></label>
            <input type="range" id="lowThreshSlider" min="0" max="255" step="1" value="50">
          </div>
          <div class="slider-group">
            <label>Ngưỡng cao (T_high): <span id="highThreshVal" class="val">150</span></label>
            <input type="range" id="highThreshSlider" min="0" max="255" step="1" value="150">
          </div>
        </div>

        <!-- Images -->
        <div id="imageGrid">
          <div class="image-card">
            <h2>Ảnh gốc</h2>
            <canvas id="canvasOriginal"></canvas>
          </div>
          <div class="image-card">
            <h2>Bắt cạnh (Canny)</h2>
            <canvas id="canvasCanny"></canvas>
          </div>
        </div>

        <!-- Change Image Button -->
        <button class="btn btn-outline" id="changeImageBtn">
          <i class="fa-solid fa-arrow-rotate-left"></i> Chọn ảnh khác
        </button>
      </section>

    </main>

    <script async src="https://docs.opencv.org/4.8.0/opencv.js" type="text/javascript"></script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
